name: Hourly calendar backup

on:
  schedule:
    - cron: '0 * * * *'      # every hour, on the hour (UTC)
  workflow_dispatch: {}       # adds a "Run workflow" button in the Actions tab

permissions:
  contents: write             # lets the job commit backups back to the repo

concurrency: calendar-backup  # never let two runs overlap

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      # This is the Realtime Database REST endpoint for your data path.
      # Format: https://<db>.firebaseio.com/<path>.json
      FIREBASE_URL: "https://secondshift-calendar-default-rtdb.firebaseio.com/second-shift-calendar/v1.json"
    steps:
      - uses: actions/checkout@v4

      - name: Pull snapshot from Firebase
        run: |
          set -euo pipefail
          mkdir -p backups/history
          curl -fsSL --retry 3 "$FIREBASE_URL" -o /tmp/current.json

          # Guard: never let an empty/null/failed response clobber a good backup.
          if [ ! -s /tmp/current.json ] || [ "$(cat /tmp/current.json)" = "null" ]; then
            echo "Empty or null response — skipping this run."
            exit 0
          fi

          # Normalise formatting so identical data doesn't create noise commits.
          jq -S . /tmp/current.json > /tmp/current.norm.json
          mv /tmp/current.norm.json /tmp/current.json

          if cmp -s /tmp/current.json backups/latest.json 2>/dev/null; then
            echo "No changes since last backup."
          else
            cp /tmp/current.json backups/latest.json
            cp /tmp/current.json "backups/history/calendar-$(date -u +'%Y-%m-%dT%H-%M-%SZ').json"
            echo "changed=1" >> "$GITHUB_ENV"
          fi

      - name: Commit and push if changed
        if: env.changed == '1'
        run: |
          set -euo pipefail
          git config user.name  "calendar-backup-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backups
          git commit -m "Calendar backup $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
